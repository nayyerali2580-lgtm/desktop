<!DOCTYPE html>
<html lang="en">

</head>
<body>
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Date Sheet Website</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }

        .container {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1 {
            color: #333;
        }

        input {
            margin: 10px 0;
        }

        a {
            display: block;
            margin-top: 15px;
            color: blue;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Date Sheet Upload</h1>

    <input type="file" id="fileInput">
    <br>
    <button onclick="uploadFile()">Upload</button>

    <div id="linkArea"></div>
</div>

<script>
function uploadFile() {
    let file = document.getElementById("fileInput").files[0];

    if (file) {
        let link = URL.createObjectURL(file);

        document.getElementById("linkArea").innerHTML =
            "<a href='" + link + "' download>Download Date Sheet</a>";
    } else {
        alert("Please select a file first");
    }
}
</script>

</body>
</html>
</body>
</html>
